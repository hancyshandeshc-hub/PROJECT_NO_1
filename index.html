<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Car Price Prediction</h1>
    <form id="predictionForm">
        <label for="name">Name of the Car</label>
        <input list="names" name="name" id="name" placeholder="Select or type name">
        <datalist id="names">
            <option value="Hyundai Santro Xing">
            <option value="Maruti Suzuki Alto">
            <option value="Hyundai Grand i10">
            <option value="Hyundai Elite i20">
            <option value="Maruti Suzuki Swift">
            <option value="Maruti Suzuki Wagon">
            <option value="Maruti Suzuki Ertiga">
            <option value="Others">
        </datalist>

        <label for="company">Company:</label>
        <select id="company" name="company" required>
            <option value="">--Select--</option>
            <option value="Hyundai">Hyundai</option>
            <option value="Mahindra">Mahindra</option>
            <option value="Maruti">Maruti</option>
            <option value="Ford">Ford</option>
            <option value="Toyota">Toyota</option>
            <option value="Renault">Renault</option>
            <option value="Honda">Honda</option>
            <option value="Tata">Tata</option>
            <option value="Chevrolet">Chevrolet</option>
            <option value="Others">Others</option>
        </select>

        <label for="year">Year</label>
        <input type="number" id="year" name="year" min="1900" max="2026" placeholder="YYYY" required>

        <label for="kms_driven">KMS Driven</label>
        <input type="number" id="kms_driven" name="kms_driven" min="0" placeholder="Kilometers Driven" required>

        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>
